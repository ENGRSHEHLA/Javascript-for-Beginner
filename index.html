<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Task</title>
  <link rel="stylesheet" href="task.css" />
</head>
<body>
  <h1 style="text-align: center;">Learn JavaScript</h1>
  <div style="text-align: center;">
    <button type="button" id="showDateBtn">Here is Date and Time.</button>
    <p id="emo"></p>
    <p id="abc">Here is HTML content is changed javascript.</p>
    <button type="button" id="changeTextBtn">Click Me</button>
    <br /><br />
    <label for="colorPicker">Choose page color:</label>
    <input type="color" id="colorPicker" />
  </div>
  <section class="water-card">
    <h2>Water Flow Feature</h2>
    <p>Click Start Water to play GIF. If GIF is missing, an animated water effect is used.</p>
    <div class="water-controls">
      <button type="button" id="startWaterBtn">Start Water</button>
      <button type="button" id="stopWaterBtn">Stop Water</button>
    </div>
    <img id="waterImage" src="sea.jpg" alt="Water preview" class="water-image" />
    <p id="waterStatus">Status: Stopped</p>
  </section>

  <script src="task.js"></script>
</body>

</html>
